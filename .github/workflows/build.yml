name: Codex China Provider Build

on:
  push:
    branches: [china-provider]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            codex-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check
        working-directory: ./codex-rs
        run: cargo check --workspace --exclude codex-realtime-webrtc

      - name: Test Chat Completions
        working-directory: ./codex-rs
        run: cargo test --package codex-api chat_completions

      - name: Test China Provider
        working-directory: ./codex-rs
        run: cargo test --package codex-model-provider china_provider

      - name: Test Model Provider Info
        working-directory: ./codex-rs
        run: cargo test --package codex-model-provider-info china_provider
