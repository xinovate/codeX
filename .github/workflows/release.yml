name: release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    env:
      CARGO_PROFILE_RELEASE_LTO: thin
    defaults:
      run:
        working-directory: codex-rs
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive_name: codex-linux-x64.tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_name: codex-linux-arm64.tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: codex-windows-x64.zip
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive_name: codex-macos-arm64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-dev pkg-config

      - name: Build
        run: cargo build --release --bin codex --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.archive_name }} codex

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/codex.exe -DestinationPath ${{ matrix.archive_name }}

      - name: Upload (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: codex-rs/target/${{ matrix.target }}/release/${{ matrix.archive_name }}

      - name: Upload (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: codex-rs/${{ matrix.archive_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
